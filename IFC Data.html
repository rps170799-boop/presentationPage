<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC Data — BIM Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #000000;
      --surface1:#0a0a0a;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --blue:    #3b64ff;
      --blue-dim:rgba(59,100,255,0.15);
      --text:    #e8e8f0;
      --muted:   #5a5a70;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Space Grotesk', sans-serif;
    }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; }

    .app { display:grid; grid-template-rows:48px 1fr 28px; width:100vw; height:100vh; }

    /* ── TOP BAR ── */
    .topbar {
      background:var(--surface1); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px; gap:12px; z-index:10;
    }
    .topbar-logo {
      display:flex; align-items:center; gap:8px;
      padding-right:14px; border-right:1px solid var(--border);
      text-decoration:none; color:var(--text); height:100%;
    }
    .logo-mark {
      width:22px; height:22px; background:var(--blue); border-radius:5px;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:700; color:#fff; font-family:var(--mono);
    }
    .logo-text { font-family:var(--mono); font-size:12px; letter-spacing:0.04em; }

    .topbar-breadcrumb {
      display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);
    }
    .topbar-breadcrumb span { color:var(--text); font-weight:500; }
    .topbar-breadcrumb i { font-size:9px; }

    .topbar-spacer { flex:1; }

    .chip {
      display:flex; align-items:center; gap:6px;
      background:#0a0a0a; border:1px solid var(--border);
      border-radius:6px; padding:4px 10px;
      font-size:11px; font-family:var(--mono); color:var(--text);
    }
    .chip-dot {
      width:6px; height:6px; border-radius:50%; background:#22c55e;
      animation:pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .topbar-back {
      display:flex; align-items:center; gap:6px;
      font-size:11px; color:var(--muted); background:none; border:none;
      cursor:pointer; transition:color .15s; font-family:var(--mono);
      text-decoration:none;
    }
    .topbar-back:hover { color:var(--text); }

    .divider { width:1px; height:24px; background:var(--border); }

    /* ── DASHBOARD AREA ── */
    .dashboard-area {
      position:relative; background:#000; overflow:hidden;
    }

    iframe#pbi-frame {
      width:100%; height:100%;
      border:none; display:block;
      background:#000;
    }

    /* Placeholder (shown when no embed URL set) */
    .placeholder {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; background:#000;
    }
    .placeholder-icon { font-size:40px; color:var(--blue); opacity:0.3; }
    .placeholder-title { font-size:18px; font-weight:600; color:var(--text); }
    .placeholder-sub {
      font-size:13px; color:var(--muted); text-align:center;
      max-width:380px; line-height:1.7; font-family:var(--mono);
    }
    .placeholder-sub code {
      display:block; margin-top:10px; padding:10px 16px;
      background:#0a0a0a; border:1px solid var(--border);
      border-radius:6px; font-size:11px; color:var(--blue);
      text-align:left; line-height:1.8;
    }

    /* ── STATUS BAR ── */
    .statusbar {
      background:var(--surface1); border-top:1px solid var(--border);
      display:flex; align-items:center; padding:0 12px;
      font-family:var(--mono); font-size:10px; color:var(--muted); gap:0;
    }
    .status-item {
      display:flex; align-items:center; gap:5px;
      padding:0 10px 0 0; margin-right:10px; border-right:1px solid var(--border);
    }
    .status-item:last-child { border-right:none; }
    .statusbar-spacer { flex:1; }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="topbar-logo" href="index.html">
      <div class="logo-mark">RP</div>
      <span class="logo-text">PrediData</span>
    </a>

    <div class="topbar-breadcrumb">
      Portfolio <i class="fas fa-chevron-right"></i> <span>IFC Data — BIM Dashboard</span>
    </div>

    <div class="topbar-spacer"></div>

    <div class="chip">
      <span class="chip-dot"></span>
      Power BI · Live Report
    </div>

    <div class="divider"></div>

    <a class="topbar-back" href="index.html">
      <i class="fas fa-arrow-left"></i> Portfolio
    </a>
  </header>

  <!-- DASHBOARD -->
  <div class="dashboard-area">

    <iframe
      id="pbi-frame"
      src="https://app.powerbi.com/view?r=eyJrIjoiZjY2OWFjZDYtZjMzYy00MjA1LTlhNmEtZWE3MGViMzEyNmZhIiwidCI6IjBlMGNiMDYwLTA5YWQtNDlmNS1hMDA1LTY4YjliNDlhYTFmNiIsImMiOjR9"
      allowFullScreen="true"
    ></iframe>



  </div>

  <!-- STATUS BAR -->
  <footer class="statusbar">
    <div class="status-item">
      <i class="fas fa-database"></i>
      <span>BIM Data Pipeline — Speckle + Power BI</span>
    </div>
    <div class="statusbar-spacer"></div>
    <div class="status-item">
      <i class="fas fa-arrow-up-right-from-square"></i>
      <span>Rodrigo Pacheco Serna · BIM Engineer & Developer</span>
    </div>
  </footer>

</div>


</body>
</html>
